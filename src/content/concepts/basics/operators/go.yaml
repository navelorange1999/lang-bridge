title: Operators
order: 3
sections:
  - id: arithmetic
    code: |
      x := 10 + 3     // 13
      y := 10 - 3     // 7
      z := 10 * 3     // 30
      d := 10 / 3     // 3 (integer division)
      m := 10 % 3     // 1
      p := 1 << 3     // 8 (bitwise shift)
  - id: comparison
    code: |
      fmt.Println(5 == 5)    // true
      fmt.Println(5 != 3)    // true
      fmt.Println(5 > 3)     // true
      fmt.Println(5 <= 5)    // true
      a := [2]int{1, 2}
      b := [2]int{1, 2}
      fmt.Println(a == b)    // true (arrays are comparable)
  - id: logical
    code: |
      fmt.Println(true && false)   // false
      fmt.Println(true || false)   // true
      fmt.Println(!true)           // false
      if x > 0 && x < 100 {
          fmt.Println("in range")
      }
  - id: assignment
    code: |
      x := 10
      x += 5     // 15
      x -= 3     // 12
      x *= 2     // 24
      x /= 4     // 6
      x %= 5     // 1
      x++        // 2 (statement, not expression)
explanation: |
  Go deliberately omits many operators found in other languages. There is no ternary operator — use if/else instead. Integer division truncates. Logical operators (&&, ||, !) short-circuit. The ++ and -- are statements, not expressions, so they cannot be used inline. Arrays are comparable with == but slices are not.
