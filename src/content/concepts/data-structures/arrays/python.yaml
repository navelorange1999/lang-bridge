explanation: |
  Python lists are dynamic and heterogeneous. Use list comprehensions instead of map/filter for idiomatic code. Slicing with [start:end:step] is powerful and concise. Negative indexing accesses elements from the end. The starred expression (*rest) captures remaining elements during unpacking.
