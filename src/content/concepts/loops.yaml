id: loops
title: Loops

languages:
  javascript:
    code: |
      // for loop
      for (let i = 0; i < 5; i++) {
        console.log(i);
      }

      // for...of loop
      for (const item of [1, 2, 3]) {
        console.log(item);
      }

      // while loop
      let i = 0;
      while (i < 5) {
        console.log(i++);
      }
    explanation: |
      JavaScript has C-style for loops, for...of for iterables, and while loops.

  python:
    code: |
      # for loop with range
      for i in range(5):
          print(i)

      # for loop over list
      for item in [1, 2, 3]:
          print(item)

      # while loop
      i = 0
      while i < 5:
          print(i)
          i += 1
    explanation: |
      Python uses for...in for iteration and range() for numeric loops. Indentation defines blocks.

  typescript:
    code: |
      // for loop
      for (let i = 0; i < 5; i++) {
        console.log(i);
      }

      // for...of loop
      for (const item of [1, 2, 3]) {
        console.log(item);
      }
    explanation: |
      TypeScript loops are identical to JavaScript with optional type annotations.

  go:
    code: |
      // C-style for loop
      for i := 0; i < 5; i++ {
          fmt.Println(i)
      }

      // range loop
      for _, item := range []int{1, 2, 3} {
          fmt.Println(item)
      }
    explanation: |
      Go only has the for keyword — no while. Use for without init/post as a while loop.

  rust:
    code: |
      // for loop with range
      for i in 0..5 {
          println!("{}", i);
      }

      // for loop over iterator
      for item in vec![1, 2, 3] {
          println!("{}", item);
      }

      // while loop
      let mut i = 0;
      while i < 5 {
          println!("{}", i);
          i += 1;
      }
    explanation: |
      Rust uses ranges (0..5) and iterators. The for loop always iterates over an iterator.

mental_shift: |
  Python eliminates the classic C-style for loop in favor of for...in with range(). Go unifies all loop types under a single for keyword. Rust's loops are iterator-based, making them composable with iterator adapters.

gotchas:
  - Python uses indentation instead of braces — mixing tabs and spaces causes errors
  - Go has no while keyword — use for condition {} instead
  - Rust's for loop takes ownership of the iterator unless you use references
  - JavaScript's for...in iterates over keys, not values — use for...of for values
