id: variables
title: Variables

languages:
  javascript:
    code: |
      let x = 10;
      const y = 20;
      var z = 30;
    explanation: |
      Use let for block-scoped mutable variables, const for block-scoped constants, and var (legacy) for function-scoped variables.

  python:
    code: |
      x = 10
      y = 20
      z = 30
    explanation: |
      Variables are dynamically typed. No declaration keywords needed.

  typescript:
    code: |
      let x: number = 10;
      const y: number = 20;
    explanation: |
      TypeScript adds static type annotations to JavaScript variable declarations.

  go:
    code: |
      var x int = 10
      y := 20
      const z = 30
    explanation: |
      Go uses var for explicit declarations, := for short declarations, and const for constants.

  rust:
    code: |
      let x = 10;
      let mut y = 20;
      const Z: i32 = 30;
    explanation: |
      Variables are immutable by default. Use mut for mutable variables.

mental_shift: |
  Python does not require explicit declaration keywords like let or const. Go and Rust variables are immutable by default, which is the opposite of JavaScript's behavior.

gotchas:
  - No const keyword in Python — everything is mutable by default
  - Python variables are dynamically typed — no type annotations required
  - Rust variables are immutable by default — you must use mut to allow mutation
  - Go's := short declaration only works inside functions
